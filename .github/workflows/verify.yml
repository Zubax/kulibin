name: verify
on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zubax/zubax-fpga-toolchain:2026-05-15
    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: make lint

      - name: Run all testbenches
        run: make verify
