name: verify
on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zubax/zubax-fpga-toolchain:2026-05-15
      # The image's default user is `ubuntu` (UID 1000) but the GHA runner mounts
      # /__w as UID 1001, which makes actions/checkout fail on EACCES. Run as
      # root so the workspace and toolchain paths are both writable.
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: make lint

      - name: Run all testbenches
        run: make verify
