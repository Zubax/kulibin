## Maximum-verification CI: every simulation testbench, every algebraic property test, and every
## formal-equivalence proof under float/proof/. Slow (~45 minutes wall-clock on the Zubax toolchain
## container), so it runs only on commits pushed to `main` or commits whose message includes the
## "#ci-float" marker. The cheap `verify.yml` workflow continues to gate every PR.

name: verify-deep

on:
  push:

jobs:
  verify-deep:
    if: |
      github.ref == 'refs/heads/main' ||
      contains(github.event.head_commit.message, '#ci-float')
    runs-on: ubuntu-latest
    container:
      # 2026-05-18 is the first toolchain image that bundles sby, yices2, and bitwuzla; nothing
      # else needs to be installed in the job. Bump this date when the toolchain image is updated.
      image: ghcr.io/zubax/zubax-fpga-toolchain:2026-05-18
      # See verify.yml for why root is needed.
      options: --user root
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: make lint

      - name: Run maximum verification
        run: make verify-deep

      - name: Upload formal verification report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: float-formal-report
          path: |
            build/float/formal/report.html
            build/float/formal/summary.json
            build/float/formal/**/trace.vcd
          retention-days: 30

      - name: Upload Verilator coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: float-coverage-report
          path: build/float/coverage/
          retention-days: 30
